<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Proposals</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
        padding: 32px;
      }
      h1 { font-size: 18px; margin: 0 0 24px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }
      .card {
        border: 1px solid #30363d;
        border-radius: 8px;
        background: #161b22;
        padding: 16px;
      }
      .name { font-size: 13px; color: #8b949e; margin-bottom: 12px; font-family: ui-monospace, monospace; }
      .sizes { display: flex; align-items: center; gap: 20px; }
      .sizes .swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .sizes .swatch span { font-size: 11px; color: #6e7681; }
      .light-row { margin-top: 16px; padding-top: 16px; border-top: 1px solid #30363d; background: #ffffff; border-radius: 6px; padding: 16px; }
      .light-row .swatch span { color: #818b98; }
    </style>
  </head>
  <body>
    <h1>AI Review Manager — アイコン案（案3: &lt;/&gt; ベース）</h1>
    <div class="grid" id="grid"></div>
    <script>
      const files = [
        "v1-brackets-check-blue.svg",
        "v2-brackets-check-green.svg",
        "v3-brackets-sparkle-blue.svg",
        "v4-solid-tile-check.svg",
      ];
      const sizes = [16, 32, 64, 128];
      const grid = document.getElementById("grid");
      for (const f of files) {
        const card = document.createElement("div");
        card.className = "card";
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = f;
        card.appendChild(name);
        const row = document.createElement("div");
        row.className = "sizes";
        for (const s of sizes) {
          const sw = document.createElement("div");
          sw.className = "swatch";
          const img = document.createElement("img");
          img.src = f;
          img.width = s;
          img.height = s;
          const label = document.createElement("span");
          label.textContent = s + "px";
          sw.appendChild(img);
          sw.appendChild(label);
          row.appendChild(sw);
        }
        card.appendChild(row);
        grid.appendChild(card);
      }
    </script>
  </body>
</html>
